name: Procesar facturas Dropbox

on:
  workflow_dispatch:
  repository_dispatch:
    types: [dropbox_invoice]

jobs:
  procesar_facturas:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr ghostscript qpdf poppler-utils

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar procesamiento
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          python process_invoices.py

      - name: Subir archivo de prueba
        run: |
          echo "prueba ok" > prueba.txt
          curl -X POST "https://content.dropboxapi.com/2/files/upload" \
            --header "Authorization: Bearer ${{ steps.token.outputs.access_token }}" \
            --header "Dropbox-API-Arg: {\"path\": \"/Salidas/prueba_github.txt\", \"mode\": \"overwrite\", \"autorename\": false, \"mute\": true}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @prueba.txt
